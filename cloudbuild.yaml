steps:
  # 1. Construir la imagen Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backend-domicilios:$COMMIT_SHA'
      - '.'

  # 2. Subir la imagen al registro
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/backend-domicilios:$COMMIT_SHA'

  # 3. Desplegar la nueva imagen en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'domicilios'
      - '--image'
      - 'gcr.io/$PROJECT_ID/backend-domicilios:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--quiet'

images:
  - 'gcr.io/$PROJECT_ID/backend-domicilios:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY